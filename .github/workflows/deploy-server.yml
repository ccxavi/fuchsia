name: Deploy server to Render

on:
  push:
    branches: [main]
    paths:
      - "apps/server/**"
      - ".github/workflows/deploy-server.yml"

concurrency:
  group: deploy-server-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/server
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - name: Install Python (reads .python-version = 3.12.7)
        run: uv python install
      - name: Sync dependencies (incl. dev group)
        run: uv sync --frozen
      - name: Run tests
        run: uv run pytest

  deploy:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "::error::RENDER_DEPLOY_HOOK_URL secret is not set"
            exit 1
          fi
          curl -fsSL "$RENDER_DEPLOY_HOOK_URL"
